---
layout: null
---
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff;
      color: #222;
      padding: 1.5rem 2rem;
      max-width: 860px;
    }
    ul { list-style: none; }
    li {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .date {
      color: #aaa;
      font-size: 0.78rem;
      white-space: nowrap;
      width: 5.2rem;
      flex-shrink: 0;
    }
    .cat {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cat-arxiv  { color: #1a6bbf; background: #e8f0fb; }
    .cat-daily  { color: #2a8a4a; background: #e6f4ea; }
    .cat-other  { color: #888;    background: #f2f2f2; }
    a {
      color: #222;
      text-decoration: none;
      font-size: 0.92rem;
      line-height: 1.4;
    }
    a:hover { color: #1a6bbf; text-decoration: underline; }
  </style>
</head>
<body>
  <ul>
    {% for post in site.posts %}
    <li>
      <span class="date">{{ post.date | date: "%Y-%m-%d" }}</span>
      {% for cat in post.categories %}
        {% if cat == "arxiv" %}
          <span class="cat cat-arxiv">arxiv</span>
        {% elsif cat == "daily" %}
          <span class="cat cat-daily">daily</span>
        {% else %}
          <span class="cat cat-other">{{ cat }}</span>
        {% endif %}
      {% endfor %}
      <a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
